# Vertex v2 — non-secret config. Secrets live in .env (git-ignored); see .env.example.
# Robustness-first systematic bot. Distinct magic (8800333) from v1 so they never collide.

magic: 8800333

# Multi-asset universe (NOT crypto-only): majority global equity indices + FX + small crypto bloc.
# proxy = yfinance daily symbol used for signals/backtest; exness = live CFD symbol; bloc = risk bloc.
universe:
  indices:
    - {proxy: "^GSPC",     exness: "US500m",   region: "US"}
    - {proxy: "^NDX",      exness: "USTECm",   region: "US"}
    - {proxy: "^GDAXI",    exness: "DE30m",    region: "EU"}
    - {proxy: "^FTSE",     exness: "UK100m",   region: "EU"}
    - {proxy: "^FCHI",     exness: "FR40m",    region: "EU"}
    - {proxy: "^STOXX50E", exness: "STOXX50m", region: "EU"}
    - {proxy: "^N225",     exness: "JP225m",   region: "APAC"}
    - {proxy: "^HSI",      exness: "HK50m",    region: "APAC"}
    - {proxy: "^AXJO",     exness: "AUS200m",  region: "APAC"}
    - {proxy: "^NSEI",     exness: "IN50m",    region: "APAC"}
  # Government bonds — the key diversifier missing on Exness, available as CFDs on IC Markets
  # (US 10Y, Bund, Gilt, JGB, BTP). Backtested via US-Treasury ETF proxies; live symbols to be
  # confirmed from the IC Markets Market Watch during the broker migration.
  bonds:
    - {proxy: "IEF",       broker: "US10Y",   note: "US 7-10Y Treasury"}
    - {proxy: "TLT",       broker: "US30Y",   note: "US 20Y+ Treasury"}
    - {proxy: "BWX",       broker: "INTLGOVT", note: "intl developed govt bonds (Bund/Gilt/JGB proxy)"}
  fx:
    - {proxy: "EURUSD=X",  exness: "EURUSDm"}
    - {proxy: "GBPUSD=X",  exness: "GBPUSDm"}
    - {proxy: "USDJPY=X",  exness: "USDJPYm"}
    - {proxy: "AUDUSD=X",  exness: "AUDUSDm"}
  commodities:   # traded as US-hours ETF CFDs on IC Markets; proxy = the ETF itself so backtest = reality
    - {proxy: "GC=F",      broker: "XAUUSD",   note: "gold (native metal CFD)"}
    - {proxy: "BNO",       broker: "BNO",      note: "Brent crude — US Brent Oil Fund ETF"}
    - {proxy: "UNG",       broker: "UNG",      note: "natural gas ETF"}
    - {proxy: "CORN",      broker: "CORN",     note: "corn ETF — agriculture diversifier"}
  crypto:
    - {proxy: "BTC-USD",   exness: "BTCUSDm",  bloc: "crypto"}
    - {proxy: "ETH-USD",   exness: "ETHUSDm",  bloc: "crypto"}

# Pre-registered risk parameters (robustness-first dial — see plan). NOT fitted.
risk:
  vol_target: 0.10          # portfolio annualized vol target
  dd_throttle_floor: 0.15   # gross scales 100%->floor as trailing DD goes 0 -> -15%
  kill_switch_dd: 0.20      # flatten the systematic book at -20% from peak
  crypto_bloc_cap: 0.15     # crypto bloc max share of portfolio risk
  corr_floor: 0.30          # never assume pairwise corr below this when forecasting vol

# Sleeve risk budgets (fixed, pre-registered — NOT optimized weights).
sleeves:
  slow_trend: 0.50
  fast_trend: 0.25
  xsect: 0.25

rebalance_days: 21          # monthly rebalance cadence

# IC Markets live symbols (yfinance proxy -> broker ticker). BEST-GUESS placeholders —
# CONFIRM every one against your IC Markets MT5 Market Watch before going live (names and
# suffixes vary by account/region; some, e.g. India 50, may not exist). The rebalancer
# skips any unmapped instrument and warns.
broker: "IC Markets"
broker_symbols:
  # CONFIRMED from the IC Markets Market Watch dump (2026-07-15). Native index CFDs + gold
  # metal + FX; bonds/energy/ag/crypto as US-hours ETF CFDs. Dow + copper dropped (no CFD).
  "^GSPC": "SP500m"
  "^NDX": "ND100m"
  "^GDAXI": "GDAXIm"
  "^FTSE": "UK100"
  "^FCHI": "FCHI40"
  "^STOXX50E": "STOX50"
  "^N225": "NI225"
  "^HSI": "HSI50"
  "^AXJO": "AUS200"
  "^NSEI": "INDA"
  "IEF": "IEF"
  "TLT": "TLT"
  "BWX": "BWX"
  "EURUSD=X": "EURUSD"
  "GBPUSD=X": "GBPUSD"
  "USDJPY=X": "USDJPY"
  "AUDUSD=X": "AUDUSD"
  "GC=F": "XAUUSD"
  "BNO": "BNO"
  "UNG": "UNG"
  "CORN": "CORN"
  "BTC-USD": "BTC"
  "ETH-USD": "ETH"

execution:
  # The MT5 terminal's MQL5/Files folder — where VertexPlacerV2 reads the .reb book + risk
  # directive. Shared with v1's files, but names (vxq_v2_*) and magic (8800333) are distinct.
  queue_dir: "/Users/izuchukwuogbodo/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/Program Files/MetaTrader 5/MQL5/Files"
  demo_balance_fallback: 100000
  magic: 8800333        # isolated from v1 (8800111/8800222) — v2 can never touch v1 positions
